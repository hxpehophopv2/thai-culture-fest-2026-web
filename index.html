<!DOCTYPE html>
<html lang="">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/src/assets/images/posterHero.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thai Sustainable Culture Fest 2026</title>
</head>

<body>
  <!-- Initial Loading Screen — OUTSIDE #app so Vue won't destroy it -->
  <div id="initial-loader">
    <style>
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #fbfdfe;
        z-index: 999999;
        transition: opacity 0.35s ease;
      }
      #initial-loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .initial-loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(1, 54, 108, 0.1);
        border-radius: 50%;
        border-top-color: #01366c;
        animation: initial-spin 0.8s linear infinite;
        margin-bottom: 12px;
      }
      .initial-loader-text {
        color: #61656f;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        font-size: 14px;
        font-weight: 500;
        margin: 0;
      }
      @keyframes initial-spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <div class="initial-loader-spinner"></div>
    <p class="initial-loader-text">Loading...</p>
  </div>

  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
